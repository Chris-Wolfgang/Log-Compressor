name: Release on Published Release


on:
  release:
    types: [published]

permissions:
  contents: read  # Default to read-only; individual jobs declare write where required

env:
  CODECOV_MINIMUM: 90
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: src/Wolfgang.LogCompressor/Wolfgang.LogCompressor.csproj

jobs:
  # Streamlined validation: build, test, coverage
  validate-release:
    name: Validate Release Build
    runs-on: windows-latest
    if: github.repository != 'Chris-Wolfgang/repo-template'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Solution (Release)
        run: dotnet build --no-restore --configuration Release

      - name: Run tests with coverage
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem -Path './tests' -Recurse -Filter '*Test*.csproj'

          if ($testProjects.Count -eq 0) {
            Write-Error "❌ No test projects found - release requires tests to validate quality"
            exit 1
          }

          foreach ($testProj in $testProjects) {
            Write-Host "Testing: $($testProj.Name)" -ForegroundColor Cyan

            dotnet test $testProj.FullName `
              --configuration Release `
              --no-build `
              --no-restore `
              --collect:"XPlat Code Coverage" `
              --results-directory "./TestResults" `
              --logger "console;verbosity=minimal"

            if ($LASTEXITCODE -ne 0) {
              Write-Error "❌ Tests failed in $($testProj.Name)"
              exit $LASTEXITCODE
            }
          }
          Write-Host "✅ All tests passed" -ForegroundColor Green

      - name: Verify coverage threshold
        shell: pwsh
        run: |
          $coverageFiles = Get-ChildItem -Path "TestResults" -Recurse -Filter "coverage.cobertura.xml" -ErrorAction SilentlyContinue

          if ($coverageFiles.Count -eq 0) {
            Write-Error "❌ No coverage files found"
            exit 1
          }

          dotnet tool install -g dotnet-reportgenerator-globaltool

          reportgenerator `
            -reports:"TestResults/**/coverage.cobertura.xml" `
            -targetdir:"CoverageReport" `
            -reporttypes:"TextSummary;Html"

          Get-Content CoverageReport/Summary.txt

          $summaryContent = Get-Content CoverageReport/Summary.txt
          $threshold = if ($env:CODECOV_MINIMUM) { [int]$env:CODECOV_MINIMUM } else { 90 }
          $failedModules = @()

          foreach ($line in $summaryContent) {
            if ($line -match '^([^ ]+)\s+.*\s+(\d+(?:\.\d+)?)%$' -and $line -notmatch '^Summary') {
              $module = $matches[1]
              $coverage = [decimal]$matches[2]

              if ($coverage -lt $threshold) {
                $failedModules += "$module (${coverage}%)"
              }
            }
          }

          if ($failedModules.Count -gt 0) {
            Write-Error "❌ Coverage below ${threshold}%: $($failedModules -join ', ')"
            exit 1
          }

          Write-Host "✅ All modules meet ${threshold}% coverage threshold" -ForegroundColor Green

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-coverage
          path: CoverageReport/

  # Build self-contained binaries for each platform
  publish-binaries:
    name: Publish ${{ matrix.rid }}
    needs: validate-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            archive: zip
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar.gz
          - rid: osx-x64
            os: macos-latest
            archive: tar.gz
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish self-contained binary
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained
          --output ./publish

      - name: Create archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path ./publish/* -DestinationPath logc-${{ matrix.rid }}.zip

      - name: Create archive (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          tar -czf logc-${{ matrix.rid }}.tar.gz -C ./publish .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: logc-${{ matrix.rid }}
          path: logc-${{ matrix.rid }}.*

  # Attach platform binaries and coverage report to the GitHub Release
  update-release-artifacts:
    name: Attach Artifacts to Release
    needs: [validate-release, publish-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to upload assets to the GitHub Release
    steps:
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: logc-*
          merge-multiple: true

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: release-coverage
          path: ./release-coverage

      - name: Zip coverage report
        run: zip -r release-coverage.zip ./release-coverage

      - name: Attach artifacts to release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b  # v2.5.0
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            ./artifacts/logc-*.zip
            ./artifacts/logc-*.tar.gz
            release-coverage.zip
